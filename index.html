<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        :root {
            --bg-color: #fcf6f6;
            --card-bg: #ffffff;
            --primary-pink: #e8a7a1;
            --primary-hover: #df928b;
            --text-main: #4a3e3d;
            --text-muted: #8a7a79;
            --correct-color: #a3cdbb;
            --incorrect-color: #e8b4b4;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(232, 167, 161, 0.15);
        }
        .progress {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        .option-btn {
            width: 100%;
            padding: 14px;
            background-color: #fff;
            border: 1px solid #ebdcdb;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #fff0ef;
        }
        .option-btn.correct {
            background-color: var(--correct-color);
            color: #2b4c3f;
        }
        .option-btn.incorrect {
            background-color: var(--incorrect-color);
            color: #5c2c2c;
        }
        .action-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .action-btn:hover {
            background-color: var(--primary-hover);
        }
        .score-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-pink);
            margin: 15px 0;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const quizData = [
                {
                    question: "Which HTML5 element is used to display a standalone piece of independent content?",
                    options: ["section", "article", "aside", "div"],
                    correct: 1
                },
                {
                    question: "Which JavaScript method is used to write conditional rendering logic by filtering out array elements?",
                    options: ["map()", "forEach()", "filter()", "reduce()"],
                    correct: 2
                },
                {
                    question: "In CSS, what does the 'flex-direction: column' property do?",
                    options: ["Stacks items vertically", "Aligns items horizontally", "Grid layout initialization", "Wraps elements to the next line"],
                    correct: 0
                }
            ];

            let currentQuestionIndex = 0;
            let score = 0;
            let hasAnswered = false;

            const quizScreen = document.getElementById('quiz-screen');
            const resultsScreen = document.getElementById('results-screen');
            const progressText = document.getElementById('progress-text');
            const questionText = document.getElementById('question-text');
            const optionsContainer = document.getElementById('options-container');
            const nextBtn = document.getElementById('next-btn');
            const finalScore = document.getElementById('final-score');
            const restartBtn = document.getElementById('restart-btn');

            function startQuiz() {
                currentQuestionIndex = 0;
                score = 0;
                resultsScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                loadQuestion();
            }

            function loadQuestion() {
                hasAnswered = false;
                nextBtn.classList.add('hidden');
                optionsContainer.innerHTML = '';

                const currentData = quizData[currentQuestionIndex];
                progressText.innerText = "Question " + (currentQuestionIndex + 1) + " of " + quizData.length;
                questionText.innerText = currentData.question;

                currentData.options.forEach((option, index) => {
                    const button = document.createElement('button');
                    button.classList.add('option-btn');
                    button.innerText = option;
                    button.onclick = function() { selectOption(index, button); };
                    optionsContainer.appendChild(button);
                });
            }

            function selectOption(selectedIndex, selectedButton) {
                if (hasAnswered) return;
                hasAnswered = true;

                const currentData = quizData[currentQuestionIndex];
                const correctIndex = currentData.correct;
                const buttons = optionsContainer.querySelectorAll('.option-btn');

                buttons.forEach(btn => btn.disabled = true);

                if (selectedIndex === correctIndex) {
                    selectedButton.classList.add('correct');
                    score++;
                } else {
                    selectedButton.classList.add('incorrect');
                    buttons[correctIndex].classList.add('correct');
                }

                nextBtn.classList.remove('hidden');
                if (currentQuestionIndex === quizData.length - 1) {
                    nextBtn.innerText = "View Results";
                } else {
                    nextBtn.innerText = "Next Question";
                }
            }

            nextBtn.onclick = function() {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    quizScreen.classList.add('hidden');
                    resultsScreen.classList.remove('hidden');
                    finalScore.innerText = score + " / " + quizData.length;
                }
            };

            restartBtn.onclick = startQuiz;

            // Trigger initialization safely
            startQuiz();
        });
    </script>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="progress" id="progress-text">Question 1 of 3</div>
            <h2 id="question-text">Loading...</h2>
            <div class="options-list" id="options-container"></div>
            <button id="next-btn" class="action-btn hidden">Next Question</button>
        </div>

        <div id="results-screen" class="hidden">
            <h2>Quiz Completed</h2>
            <p>Your final score is:</p>
            <div class="score-display" id="final-score">0 / 0</div>
            <button id="restart-btn" class="action-btn">Restart Quiz</button>
        </div>
    </div>

</body>
</html>
